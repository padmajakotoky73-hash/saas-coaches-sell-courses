```yaml
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
        node-version: ["20.x"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Setup Python
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    # Setup Node.js
    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    # Install Python dependencies
    - name: Install Python dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Run pytest
    - name: Run FastAPI tests
      working-directory: ./backend
      run: pytest

    # Install Node.js dependencies
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci

    # Run Vitest
    - name: Run frontend tests
      working-directory: ./frontend
      run: npm test

  security:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Trivy container scan
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        ignore-unfixed: true
        exit-code: '1'
        format: 'table'
        severity: 'CRITICAL,HIGH'

    # Snyk security scan
    - name: Run Snyk security scan
      uses: snyk/actions/setup@master
      with:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      continue-on-error: true
    - name: Snyk test
      run: snyk test --all-projects

    # OWASP ZAP scan
    - name: OWASP ZAP baseline scan
      uses: zaproxy/action-baseline@v0.7.0
      with:
        target: 'http://localhost:8000'
        rules_file_name: '.zap/rules.tsv'
        cmd_options: '-config api.disablekey=true'

  migrations:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install Python dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Alembic migrations
      working-directory: ./backend
      run: |
        alembic upgrade head

  openapi:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install Python dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generate OpenAPI docs
      working-directory: ./backend
      run: |
        python -c "from app.main import app; import json; open('openapi.json', 'w').write(json.dumps(app.openapi()))"

    - name: Commit OpenAPI docs
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add ./backend/openapi.json
        git commit -m "Update OpenAPI docs" || echo "No changes to commit"
        git push

  deploy:
    needs: [test, security, migrations, openapi]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Deploy backend to Railway
    - name: Deploy backend to Railway
      uses: railwayapp/action@v1
      with:
        service: backend
        token: ${{ secrets.RAILWAY_TOKEN }}
        environment: production

    # Deploy frontend to Vercel
    - name: Deploy frontend to Vercel
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: ./frontend
```